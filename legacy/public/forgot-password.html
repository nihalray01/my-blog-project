<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recover Password - NexusBlog</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .hidden { display: none; }
    </style>
</head>

<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo center-logo">Nexus<span>Blog</span></div>
            <h2>Memory Flush</h2>
            <p id="step-desc" class="auth-subtitle">Verify your identity to re-initialize your credentials.</p>

            <!-- Step 1: Username -->
            <div id="step-1">
                <div class="form-group">
                    <label for="recovery-username">Username</label>
                    <input type="text" id="recovery-username" placeholder="Enter your username">
                </div>
                <button type="button" class="btn primary-btn full-width" onclick="getSecurityQuestion()">Next</button>
            </div>

            <!-- Step 2: Answer Question -->
            <div id="step-2" class="hidden">
                <div class="form-group">
                    <label id="display-question" style="color: var(--primary); font-weight: 600;"></label>
                    <input type="text" id="recovery-answer" placeholder="Your secret answer">
                </div>
                <button type="button" class="btn primary-btn full-width" onclick="verifyAnswer()">Verify Identity</button>
            </div>

            <!-- Step 3: New Password -->
            <div id="step-3" class="hidden">
                <div class="form-group">
                    <label for="new-password">New Password</label>
                    <input type="password" id="new-password" placeholder="Choose a new password">
                </div>
                <button type="button" class="btn primary-btn full-width" onclick="resetPassword()">Reset Password</button>
            </div>

            <p class="auth-footer" style="margin-top: 2rem;"><a href="login.html">← Back to login</a></p>
        </div>
    </div>

    <script>
        let currentUsername = '';

        async function getSecurityQuestion() {
            const username = document.getElementById('recovery-username').value;
            if (!username) return alert('Please enter your username');

            try {
                const res = await fetch(`/api/forgot-password/question/${username}`);
                const data = await res.json();

                if (res.ok) {
                    currentUsername = username;
                    document.getElementById('step-1').classList.add('hidden');
                    document.getElementById('step-2').classList.remove('hidden');
                    document.getElementById('display-question').innerText = data.question;
                    document.getElementById('step-desc').innerText = "Answer your secret question";
                } else {
                    alert(data.error || 'User not found');
                }
            } catch (err) {
                alert('Could not fetch recovery information');
            }
        }

        async function verifyAnswer() {
            const answer = document.getElementById('recovery-answer').value;
            if (!answer) return alert('Please enter your answer');

            // Verification happened as part of the reset call in this simple architecture
            document.getElementById('step-2').classList.add('hidden');
            document.getElementById('step-3').classList.remove('hidden');
            document.getElementById('step-desc').innerText = "Create a new secure password";
        }

        async function resetPassword() {
            const answer = document.getElementById('recovery-answer').value;
            const newPassword = document.getElementById('new-password').value;

            if (!newPassword) return alert('Please enter a new password');

            try {
                const res = await fetch('/api/forgot-password/reset', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        username: currentUsername, 
                        answer: answer,
                        newPassword: newPassword 
                    })
                });

                const data = await res.json();

                if (res.ok) {
                    alert('Password reset successful! Redirecting to login...');
                    window.location.href = 'login.html';
                } else {
                    alert(data.error || 'Reset failed');
                    // If answer was wrong, go back to step 2
                    if (data.error.includes('Answer')) {
                        document.getElementById('step-3').classList.add('hidden');
                        document.getElementById('step-2').classList.remove('hidden');
                    }
                }
            } catch (err) {
                alert('An error occurred during reset');
            }
        }
    </script>
</body>

</html>
