<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Code Review Center - NexusBlog</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Nexus<span>Blog</span></div>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="dashboard.html">Dashboard</a>
        </div>
    </nav>

    <main class="container">
        <header class="feed-header">
            <h1>Code Review <span>Center</span></h1>
            <p>Get elite feedback on your logic from developers worldwide.</p>
            <button onclick="openUploadModal()" class="btn primary-btn">+ Submit Snippet</button>
        </header>

        <section id="snippets-container" class="posts-grid">
            <div class="loading-spinner"></div>
        </section>
    </main>

    <!-- Upload Snippet Modal -->
    <div id="upload-modal" class="modal hidden">
        <div class="auth-card modal-content" style="max-width: 800px;">
            <h2>Submit for Review</h2>
            <form id="snippet-form">
                <div class="form-group">
                    <label>Snippet Title</label>
                    <input type="text" id="snippet-title" placeholder="e.g., Optimizing React Render cycles" required>
                </div>
                <div class="form-group">
                    <label>Language</label>
                    <select id="snippet-lang">
                        <option value="javascript">JavaScript</option>
                        <option value="python">Python</option>
                        <option value="go">Go</option>
                        <option value="rust">Rust</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Code</label>
                    <textarea id="snippet-code" style="min-height: 200px; font-family: monospace;" placeholder="Paste your code here..."></textarea>
                </div>
                <div class="modal-footer">
                    <button type="button" onclick="closeUploadModal()" class="btn secondary-btn">Cancel</button>
                    <button type="submit" class="btn primary-btn">Launch Review</button>
                </div>
            </form>
        </div>
    </div>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', loadSnippets);

        async function loadSnippets() {
            const res = await fetch('/api/snippets');
            const snippets = await res.json();
            const container = document.getElementById('snippets-container');
            container.innerHTML = '';

            snippets.forEach(s => {
                const card = document.createElement('div');
                card.className = 'post-card';
                card.innerHTML = `
                    <div class="post-meta">
                        <span class="post-author">@${s.username}</span>
                        <span>${s.language.toUpperCase()}</span>
                    </div>
                    <h3 class="post-title">${s.title}</h3>
                    <pre class="code-block">${escapeHtml(s.code.substring(0, 100))}...</pre>
                    <div class="post-actions" style="margin-top: auto; padding-top: 1rem;">
                        <button class="btn secondary-btn" style="width: 100%">Open Review</button>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function openUploadModal() { document.getElementById('upload-modal').classList.remove('hidden'); }
        function closeUploadModal() { document.getElementById('upload-modal').classList.add('hidden'); }

        document.getElementById('snippet-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const title = document.getElementById('snippet-title').value;
            const language = document.getElementById('snippet-lang').value;
            const code = document.getElementById('snippet-code').value;

            const res = await fetch('/api/snippets', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ title, code, language })
            });

            if (res.ok) {
                closeUploadModal();
                loadSnippets();
            }
        });

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
