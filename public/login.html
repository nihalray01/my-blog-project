<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NexusBlog</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo center-logo">Nexus<span>Blog</span></div>
            <h2>Nexus Portal</h2>
            <p class="auth-subtitle">Initialize your session to explore more.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                    <div style="text-align: right; margin-top: 0.4rem;">
                        <a href="forgot-password.html" style="font-size: 0.85rem; color: var(--text-muted);">Forgot Password?</a>
                    </div>
                </div>
                <button type="submit" class="btn primary-btn full-width">Sign In</button>

                <div style="margin: 2rem 0; text-align: center; color: var(--text-muted); position: relative;">
                    <span style="background: var(--surface); padding: 0 1rem; position: relative; z-index: 1;">OR</span>
                    <div style="position: absolute; top: 50%; left: 0; width: 100%; height: 1px; background: var(--border);"></div>
                </div>

                <div style="display: grid; gap: 1rem;">
                    <a href="/api/auth/google" class="btn secondary-btn" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" width="18">
                        Sign in with Google
                    </a>
                    <a href="/api/auth/github" class="btn secondary-btn" style="display: flex; align-items: center; justify-content: center; gap: 10px;">
                        <img src="https://github.githubassets.com/images/modules/logos_page/GitHub-Mark.png" width="18" style="filter: invert(1);">
                        Sign in with GitHub
                    </a>
                </div>
            </form>
            
            <p class="auth-footer">Don't have an account? <a href="register.html">Sign up</a></p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
