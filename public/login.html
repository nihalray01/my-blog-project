<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - NexusBlog</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body class="auth-body">
    <div class="auth-wrapper">
        <div class="auth-card">
            <div class="logo center-logo">Nexus<span>Blog</span></div>
            <h2>Nexus Portal</h2>
            <p class="auth-subtitle">Initialize your session to explore more.</p>
            
            <form id="login-form">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                    <div style="text-align: right; margin-top: 0.4rem;">
                        <a href="forgot-password.html" style="font-size: 0.85rem; color: var(--text-muted);">Forgot Password?</a>
                    </div>
                </div>
                <button type="submit" class="btn primary-btn full-width">Sign In</button>
            </form>
            
            <p class="auth-footer">Don't have an account? <a href="register.html">Sign up</a></p>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
