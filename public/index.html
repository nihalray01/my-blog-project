<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Blog Feed</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Nexus<span>Blog</span></div>
        <div class="nav-links" id="nav-links">
            <!-- Dynamically populated based on auth -->
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <h1>Build. Share. <br><span>Grow with Developers Worldwide</span></h1>
            <p>The elite broadcast center for next-gen code and deep narratives.</p>
            
            <div class="stats-row">
                <div class="stat-item">
                    <span class="stat-value">👨‍💻 10k+</span>
                    <span class="stat-label">Developers</span>
                </div>
                <div class="stat-item">
                    <span class="stat-value">🚀 500+</span>
                    <span class="stat-label">Projects</span>
                </div>
            </div>

            <div class="hero-actions" style="gap: 1rem; display: flex; justify-content: center;">
                <a href="register.html" class="btn primary-btn">Join Community</a>
                <a href="review.html" class="btn secondary-btn">Review Code</a>
            </div>
        </section>

        <div class="main-layout">
            <div class="feed-side">
                <header class="feed-header">
                    <h2>Recent Broadcasts</h2>
                </header>

                <section id="posts-container" class="posts-grid">
                    <div class="loading-spinner"></div>
                </section>
            </div>

            <aside class="trending-sidebar">
                <div class="sidebar-section">
                    <h3>🔥 Hot This Week</h3>
                    <div id="trending-posts" class="trending-list">
                        <!-- Injected via JS -->
                    </div>
                </div>

                <div class="sidebar-section">
                    <h3>👑 Top Developers</h3>
                    <div id="top-devs" class="trending-list">
                        <!-- Injected via JS -->
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchPosts();
        });
    </script>
</body>
</html>
