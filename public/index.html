<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modern Blog Feed</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="logo">Nexus<span>Blog</span></div>
        <div class="nav-links" id="nav-links">
            <!-- Dynamically populated based on auth -->
        </div>
    </nav>

    <main class="container">
        <section class="hero">
            <h1>The Future of <br><span>Digital Stories</span></h1>
            <p>Welcome to Nexus Blog—your immersive gateway to ideas, insights, and futuristic narratives from around the globe.</p>
            <div class="hero-actions">
                <a href="register.html" class="btn primary-btn">Start Writing</a>
            </div>
        </section>

        <header class="feed-header">
            <h2>Latest Broadcasts</h2>
            <p>Stay updated with the newest insights from the Nexus community.</p>
        </header>

        <section id="posts-container" class="posts-grid">
            <!-- Posts will be injected here via JS -->
            <div class="loading-spinner"></div>
        </section>
    </main>

    <script src="app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            fetchPosts();
        });
    </script>
</body>
</html>
